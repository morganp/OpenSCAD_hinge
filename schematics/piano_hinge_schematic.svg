<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 320" font-family="Menlo, monospace" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0392b"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="620" height="320" fill="#ffffff"/>
  <text x="20" y="24" font-size="16" font-weight="bold" fill="#1a1a1a">piano_hinge — top view (derived from knuckle_hinge)</text>

  <rect x="60" y="70" width="200" height="60" fill="#f4d35e" stroke="#2c3e50" stroke-width="2"/>
  <rect x="300" y="70" width="200" height="60" fill="#f4d35e" stroke="#2c3e50" stroke-width="2"/>

  <g fill="#e8b923" stroke="#2c3e50" stroke-width="2">
    <circle cx="270" cy="80"  r="10"/>
    <circle cx="270" cy="100" r="10"/>
    <circle cx="270" cy="120" r="10"/>
    <circle cx="290" cy="80"  r="10"/>
    <circle cx="290" cy="100" r="10"/>
    <circle cx="290" cy="120" r="10"/>
  </g>
  <line x1="280" y1="65" x2="280" y2="135" stroke="#7f8c8d" stroke-width="4" stroke-linecap="round"/>

  <!-- length -->
  <line x1="60" y1="155" x2="500" y2="155" stroke="#c0392b" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="200" y="173" fill="#1a5276">length (whole hinge, along the axis)</text>

  <!-- pitch -->
  <line x1="270" y1="55" x2="290" y2="55" stroke="#c0392b" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="296" y="59" fill="#1a5276">knuckle_pitch (target spacing)</text>
  <text x="60" y="196" fill="#555555">knuckle_count = max(3, round(length / knuckle_pitch))</text>
  <text x="60" y="212" fill="#555555">— derived, not a direct input</text>

  <!-- leaf_width -->
  <line x1="35" y1="130" x2="35" y2="70" stroke="#c0392b" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="8" y="105" fill="#1a5276" transform="rotate(-90 8 105)">leaf_width</text>

  <!-- leaf_thickness side view -->
  <text x="20" y="240" font-size="16" font-weight="bold" fill="#1a1a1a">side view</text>
  <rect x="60" y="255" width="380" height="10" fill="#f4d35e" stroke="#2c3e50" stroke-width="2"/>
  <line x1="460" y1="248" x2="460" y2="272" stroke="#c0392b" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="466" y="264" fill="#1a5276">leaf_thickness</text>

  <text x="60" y="298" fill="#555555">knuckle_od, pin_clearance, print_pin, fn</text>
  <text x="60" y="314" fill="#555555">— same meaning as knuckle_hinge</text>
</svg>
